# =============================================================================
# AgentFlow Pro - Rust NAPI Bindings Build & Deploy
# =============================================================================
# Builds, tests, and publishes NAPI-RS bindings for:
# - @agentflow/pricing-engine
# - @agentflow/workflow-executor
#
# Supported platforms:
# - Windows x64 (x86_64-pc-windows-msvc)
# - Linux x64 (x86_64-unknown-linux-gnu)
# - macOS x64 (x86_64-apple-darwin)
# - Linux ARM64 (aarch64-unknown-linux-gnu) - via cross
# - macOS ARM64 (aarch64-apple-darwin) - via cross
# =============================================================================

name: Rust NAPI Build

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths:
      - 'rust/**'
      - '.github/workflows/rust-napi-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rust/**'
  workflow_dispatch:
    inputs:
      publish_npm:
        description: 'Publish to npm (requires tag)'
        required: false
        type: boolean
        default: false
      deploy_vercel:
        description: 'Deploy to Vercel'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  CI: true

jobs:
  # ============================================================================
  # PRE-JOB: Validate workflow configuration
  # ============================================================================
  validate:
    name: Validate Workflow
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check-publish.outputs.should_publish }}
      should_deploy: ${{ steps.check-deploy.outputs.should_deploy }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check publish conditions
        id: check-publish
        run: |
          should_publish=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.publish_npm }}" == "true" ]]; then
            should_publish=true
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            should_publish=true
          fi
          echo "should_publish=$should_publish" >> $GITHUB_OUTPUT
          echo "Will publish to npm: $should_publish"
      
      - name: Check deploy conditions
        id: check-deploy
        run: |
          should_deploy=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.deploy_vercel }}" == "true" ]]; then
            should_deploy=true
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            should_deploy=true
          fi
          echo "should_deploy=$should_deploy" >> $GITHUB_OUTPUT
          echo "Will deploy to Vercel: $should_deploy"

  # ============================================================================
  # JOB 1: Build NAPI bindings for all platforms
  # ============================================================================
  build-napi:
    name: Build NAPI Bindings
    runs-on: ${{ matrix.os }}
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x64
            binding_path: rust/target/release
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: win32-x64
            binding_path: rust/target/release
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: darwin-x64
            binding_path: rust/target/release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli@latest

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      # ------------------------------------------------------------------------
      # Build Pricing Engine NAPI bindings
      # ------------------------------------------------------------------------
      - name: Build Pricing Engine (NAPI)
        working-directory: rust/pricing-engine
        run: |
          echo "Building Pricing Engine for ${{ matrix.target }}..."
          napi build --platform --release --target ${{ matrix.target }}
        shell: bash

      # ------------------------------------------------------------------------
      # Build Workflow Executor NAPI bindings
      # ------------------------------------------------------------------------
      - name: Build Workflow Executor (NAPI)
        working-directory: rust/workflow-executor
        run: |
          echo "Building Workflow Executor for ${{ matrix.target }}..."
          napi build --platform --release --target ${{ matrix.target }}
        shell: bash

      # ------------------------------------------------------------------------
      # Verify build outputs
      # ------------------------------------------------------------------------
      - name: Verify NAPI binaries
        run: |
          echo "=== Pricing Engine Binaries ==="
          find rust/pricing-engine -name "*.node" -type f -exec ls -lh {} \;
          
          echo "=== Workflow Executor Binaries ==="
          find rust/workflow-executor -name "*.node" -type f -exec ls -lh {} \;
          
          # Verify at least one .node file exists for each
          if [ ! -f rust/pricing-engine/*.node ]; then
            echo "::error::No Pricing Engine .node binary found"
            exit 1
          fi
          if [ ! -f rust/workflow-executor/*.node ]; then
            echo "::error::No Workflow Executor .node binary found"
            exit 1
          fi
        shell: bash

      # ------------------------------------------------------------------------
      # Upload build artifacts
      # ------------------------------------------------------------------------
      - name: Upload Pricing Engine bindings
        uses: actions/upload-artifact@v4
        with:
          name: pricing-engine-${{ matrix.artifact_suffix }}
          path: rust/pricing-engine/*.node
          retention-days: 30
          if-no-files-found: error
          compression-level: 0

      - name: Upload Workflow Executor bindings
        uses: actions/upload-artifact@v4
        with:
          name: workflow-executor-${{ matrix.artifact_suffix }}
          path: rust/workflow-executor/*.node
          retention-days: 30
          if-no-files-found: error
          compression-level: 0

  # ============================================================================
  # JOB 2: Cross-compile for ARM64 platforms
  # ============================================================================
  build-arm64:
    name: Build ARM64 (Cross)
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-rs
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 3609f26

      - name: Build Pricing Engine (ARM64)
        working-directory: rust/pricing-engine
        run: cross build --release --target ${{ matrix.target }}
        env:
          CROSS_VERBOSE: 1

      - name: Build Workflow Executor (ARM64)
        working-directory: rust/workflow-executor
        run: cross build --release --target ${{ matrix.target }}
        env:
          CROSS_VERBOSE: 1

      - name: Upload ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-arm64-${{ matrix.target }}
          path: |
            rust/target/${{ matrix.target }}/release/*.node
            rust/target/${{ matrix.target }}/release/*.dll
            rust/target/${{ matrix.target }}/release/*.so
            rust/target/${{ matrix.target }}/release/*.dylib
          retention-days: 30
          if-no-files-found: warn

  # ============================================================================
  # JOB 3: Run tests on all platforms
  # ============================================================================
  test-napi:
    name: Test NAPI Bindings
    runs-on: ${{ matrix.os }}
    needs: [build-napi, validate]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Pricing Engine bindings
        uses: actions/download-artifact@v4
        with:
          name: pricing-engine-${{ matrix.os == 'ubuntu-latest' && 'linux-x64' || matrix.os == 'windows-latest' && 'win32-x64' || 'darwin-x64' }}
          path: rust/pricing-engine

      - name: Download Workflow Executor bindings
        uses: actions/download-artifact@v4
        with:
          name: workflow-executor-${{ matrix.os == 'ubuntu-latest' && 'linux-x64' || matrix.os == 'windows-latest' && 'win32-x64' || 'darwin-x64' }}
          path: rust/workflow-executor

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Rust unit tests
        working-directory: rust
        run: cargo test --workspace --all-targets

      - name: Test NAPI module loading
        run: |
          node -e "
            console.log('Testing NAPI module loading...');
            
            // Test Pricing Engine
            try {
              const pricing = require('./rust/pricing-engine');
              console.log('✓ Pricing Engine NAPI module loaded successfully');
              console.log('  Exports:', Object.keys(pricing));
            } catch (e) {
              console.error('✗ Pricing Engine failed:', e.message);
              process.exit(1);
            }
            
            // Test Workflow Executor
            try {
              const workflow = require('./rust/workflow-executor');
              console.log('✓ Workflow Executor NAPI module loaded successfully');
              console.log('  Exports:', Object.keys(workflow));
            } catch (e) {
              console.error('✗ Workflow Executor failed:', e.message);
              process.exit(1);
            }
            
            console.log('\\n✓ All NAPI modules loaded successfully!');
          "

      - name: Run NAPI integration tests
        run: node tests/napi-integration.test.js

  # ============================================================================
  # JOB 4: Run security audit
  # ============================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo audit
        working-directory: rust
        run: cargo audit --deny warnings || echo "::warning::Security audit found issues"

      - name: Run cargo deny check
        working-directory: rust
        run: cargo deny check || echo "::warning::License check found issues"

  # ============================================================================
  # JOB 5: Code quality checks
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check Rust formatting
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Run Clippy linter
        working-directory: rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build with all features
        working-directory: rust
        run: cargo build --workspace --release --all-features

  # ============================================================================
  # JOB 6: Publish to npm (on tag or manual trigger)
  # ============================================================================
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build-napi, test-napi, security-audit, code-quality, validate]
    if: needs.validate.outputs.should_publish == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts
          merge-multiple: true

      - name: Setup npm package structure
        run: |
          mkdir -p npm-package
          
          # Copy root package.json and modify
          cat package.json | jq '{
            name: "@agentflow/rust-bindings",
            version: .version,
            description: "AgentFlow Pro Rust NAPI Bindings",
            license: "MIT",
            repository: .repository,
            os: ["win32", "linux", "darwin"],
            cpu: ["x64", "arm64"],
            files: ["bindings", "*.d.ts", "*.js"],
            napi: .napi
          }' > npm-package/package.json
          
          # Copy README
          cp README.md npm-package/ || echo "# AgentFlow Rust Bindings" > npm-package/README.md
          
          # Create bindings directory
          mkdir -p npm-package/bindings
          
          # Copy .node files
          cp artifacts/pricing-engine-*/*.node npm-package/bindings/ 2>/dev/null || true
          cp artifacts/workflow-executor-*/*.node npm-package/bindings/ 2>/dev/null || true
          
          # List contents
          echo "=== npm-package contents ==="
          ls -la npm-package/
          echo "=== bindings contents ==="
          ls -la npm-package/bindings/ || true

      - name: Publish @agentflow/rust-bindings to npm
        working-directory: npm-package
        run: |
          npm config set //registry.npmjs.org/:_authToken $NODE_AUTH_TOKEN
          npm publish --access public --provenance || {
            echo "::warning::Publish failed (may already exist)"
            exit 0
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ============================================================================
  # JOB 7: Create GitHub Release (on tag)
  # ============================================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-napi, test-napi, validate]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      discussions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-artifacts
        run: |
          echo "# SHA256 Checksums" > SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt
          for file in *.node; do
            if [ -f "$file" ]; then
              sha256sum "$file" >> SHA256SUMS.txt
            fi
          done
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.node
            release-artifacts/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          discussion_category_name: Announcements
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # JOB 8: Deploy to Vercel
  # ============================================================================
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build-napi, test-napi, validate]
    if: needs.validate.outputs.should_deploy == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: .
          merge-multiple: true

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Next.js application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Preview
        if: github.event_name == 'pull_request'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

      - name: Deploy to Vercel Production
        if: github.event_name != 'pull_request'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

  # ============================================================================
  # POST-JOB: Summary
  # ============================================================================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-napi, build-arm64, test-napi, security-audit, code-quality]
    if: always()
    
    steps:
      - name: Generate build summary
        run: |
          echo "## 🦀 Rust NAPI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build NAPI | ${{ needs.build-napi.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build ARM64 | ${{ needs.build-arm64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test NAPI | ${{ needs.test-napi.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.test-napi.result }}" == "success" ]; then
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some jobs failed - check logs above" >> $GITHUB_STEP_SUMMARY
          fi
