# =============================================================================
# AgentFlow Pro - Docker Compose for Local Development
# Includes: PostgreSQL, Redis, and Application
# =============================================================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentflow
      POSTGRES_PASSWORD: agentflow_password
      POSTGRES_DB: agentflow_pro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentflow-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: agentflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentflow-network

  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: agentflow-app
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://agentflow:agentflow_password@postgres:5432/agentflow_pro?schema=public
      # Redis
      UPSTASH_REDIS_REST_URL: redis://redis:6379
      # App
      NEXTAUTH_URL: http://localhost:3002
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - agentflow-network
    command: npm run dev

  # Prisma Studio (Database GUI)
  prisma-studio:
    image: timothyjmiller/prisma-studio:latest
    container_name: agentflow-prisma-studio
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: postgresql://agentflow:agentflow_password@postgres:5432/agentflow_pro?schema=public
    depends_on:
      - postgres
    networks:
      - agentflow-network
    command: npx prisma studio --hostname 0.0.0.0 --port 5555

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  agentflow-network:
    driver: bridge

# =============================================================================
# USAGE:
# 
# Start all services:
#   docker-compose up -d
#
# Stop all services:
#   docker-compose down
#
# View logs:
#   docker-compose logs -f
#
# View specific service logs:
#   docker-compose logs -f app
#   docker-compose logs -f postgres
#   docker-compose logs -f redis
#
# Rebuild app:
#   docker-compose up -d --build app
#
# Access database:
#   Host: localhost:5432
#   User: agentflow
#   Password: agentflow_password
#   Database: agentflow_pro
#
# Access Prisma Studio:
#   http://localhost:5555
#
# Access Application:
#   http://localhost:3002
# =============================================================================
