# AgentFlow Pro - Kubernetes Helm Chart
# Deploy AgentFlow Pro to Kubernetes cluster

apiVersion: v2
name: agentflow-pro
description: AI Agent Platform with enterprise capabilities
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - ai
  - agents
  - workflow
  - automation
home: https://github.com/agentflow-pro/agentflow-pro
sources:
  - https://github.com/agentflow-pro/agentflow-pro

dependencies:
  - name: postgresql
    version: 12.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
